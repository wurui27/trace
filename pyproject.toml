[tool.uv.workspace]
members = ["services/api"]

[dependency-groups]
dev = [
  "httpx>=0.28,<0.29",
  "jsonschema>=4.25,<5",
  "pytest>=9,<10",
  "pytest-asyncio>=1.3,<2",
  "pytest-cov>=7,<8",
  "ruff>=0.14,<0.15",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["services/api/tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
